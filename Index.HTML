<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">第85回 城北祭 | 公式サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #fcfcfc;
            --johoku-navy: #002366; /* 城北ネイビー */
            --accent: #d4af37;     /* 上質なゴールド */
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --border: #e0e0e0;
            --card-bg: #ffffff;
        }

        body { 
            margin: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            line-height: 1.8; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* --- 筑駒風・静かなロード画面 --- */
        #loader { 
            position: fixed; inset: 0; background: #fff; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            transition: opacity 1s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .loader-content { text-align: center; }
        .loader-line { width: 1px; height: 60px; background: var(--johoku-navy); margin: 0 auto; transform-origin: top; animation: lineGrow 1.5s infinite ease-in-out; }
        @keyframes lineGrow { 0%, 100% { transform: scaleY(0); } 50% { transform: scaleY(1); } }

        /* --- タイポグラフィ --- */
        h1, h2, h3, .serif { font-family: 'Noto Serif JP', serif; font-weight: 700; }

        /* --- ヘッダー --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 100; 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.1em; color: var(--johoku-navy); }
        
        /* テロップ（より控えめに、美しく） */
        .ticker-wrap { background: var(--johoku-navy); color: #fff; font-size: 0.75rem; padding: 5px 0; letter-spacing: 0.05em; }

        /* --- ヒーローセクション --- */
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: radial-gradient(circle at 50% 50%, #f0f0f0 0%, var(--bg) 70%);
            padding: 0 20px;
        }
        .hero-title { 
            font-size: clamp(4rem, 15vw, 10rem); color: var(--johoku-navy); 
            line-height: 1; margin: 0; letter-spacing: -0.02em;
        }
        .hero-sub { font-size: 1.2rem; margin-top: 20px; color: var(--text-sub); letter-spacing: 0.5em; text-indent: 0.5em; }

        /* --- カウントダウン (ミニマル) --- */
        .countdown { display: flex; gap: 30px; margin-top: 60px; }
        .cd-num { font-size: 2.5rem; font-weight: 300; font-family: 'Inter'; border-bottom: 1px solid var(--johoku-navy); }
        .cd-label { font-size: 0.7rem; color: var(--text-sub); margin-top: 5px; text-align: center; }

        /* --- コンテンツセクション --- */
        section { max-width: 1000px; margin: 0 auto; padding: 120px 24px; }
        .section-title { font-size: 0.8rem; letter-spacing: 0.3em; color: var(--johoku-navy); text-transform: uppercase; margin-bottom: 40px; text-align: center; position: relative; }
        .section-title::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 1px; background: var(--johoku-navy); }

        /* --- お知らせ (リスト形式) --- */
        .news-box { border-top: 1px solid var(--border); }
        .news-item { padding: 25px 0; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 150px 1fr; gap: 20px; align-items: baseline; }
        .news-date { font-family: 'Inter'; font-size: 0.9rem; color: var(--text-sub); }
        .news-text { font-weight: 500; }

        /* --- 企画カード (筑駒風タイル) --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
        .card { 
            background: var(--card-bg); padding: 0; border-radius: 0; 
            transition: transform 0.4s ease; border: none;
        }
        .card:hover { transform: translateY(-10px); }
        .card-img-dummy { width: 100%; aspect-ratio: 16/9; background: #eee; margin-bottom: 20px; }
        .group-tag { font-size: 0.7rem; color: var(--johoku-navy); border: 1px solid var(--johoku-navy); padding: 2px 8px; margin-bottom: 10px; display: inline-block; }
        .card h3 { font-size: 1.4rem; margin: 10px 0; color: var(--text-main); }
        .card p { font-size: 0.9rem; color: var(--text-sub); line-height: 1.6; }
        
        .vote-btn { 
            width: 100%; padding: 12px; background: none; border: 1px solid var(--border); 
            color: var(--text-main); font-weight: 600; cursor: pointer; transition: 0.3s;
            margin-top: 15px;
        }
        .vote-btn:hover { background: var(--johoku-navy); color: #fff; border-color: var(--johoku-navy); }
        .vote-btn.voted { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* --- タブ切り替え --- */
        .tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 50px; }
        .tab-btn { background: none; border: none; padding: 10px 0; font-weight: 600; color: var(--text-sub); cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--johoku-navy); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--johoku-navy); }

        /* --- 管理画面等のモーダル (白ベースで洗練) --- */
        .modal-content { 
            background: #fff; border-radius: 0; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .admin-input { border: 1px solid var(--border); border-radius: 0; padding: 12px; }

        /* フェードインアニメーション */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        footer { background: #1a1a1a; color: #fff; padding: 80px 20px; text-align: center; }
        .admin-link { opacity: 0.3; font-size: 0.7rem; text-decoration: none; margin-top: 40px; display: block; color: #fff; }

    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="loader-line"></div>
            <div style="margin-top:20px; letter-spacing:0.5em; font-size:0.8rem;" id="loaderTitle">JOHOKU FES</div>
        </div>
    </div>

    <header>
        <div class="header-inner">
            <div class="logo" id="headerLogo">JOHOKU FES 85</div>
            <div style="cursor:pointer; font-weight:700; font-size:0.8rem;" onclick="toggleMenu()">MENU</div>
        </div>
        <div class="ticker-wrap"><div id="tickerText" style="white-space:nowrap; animation: ticker 30s linear infinite; padding-left:100%;">ロード中...</div></div>
    </header>

    <section class="hero">
        <p class="reveal hero-sub" id="heroSub">THE 85TH</p>
        <h1 class="reveal hero-title" id="heroTitle">城北祭</h1>
        
        <div class="reveal countdown">
            <div class="cd-item"><div class="cd-num" id="cd-d">00</div><div class="cd-label">DAYS</div></div>
            <div class="cd-item"><div class="cd-num" id="cd-h">00</div><div class="cd-label">HOURS</div></div>
            <div class="cd-item"><div class="cd-num" id="cd-m">00</div><div class="cd-label">MINS</div></div>
        </div>
    </section>

    <section id="news" class="reveal">
        <h2 class="section-title">News</h2>
        <div class="news-box" id="newsContainer"></div>
    </section>

    <section id="search" class="reveal">
        <h2 class="section-title">Events</h2>
        <div class="tabs">
            <button class="tab-btn active btn-filter" onclick="filterData('all', this)">All</button>
            <button class="tab-btn btn-filter" onclick="filterData('exp', this)">Attracion</button>
            <button class="tab-btn btn-filter" onclick="filterData('exh', this)">Exhibition</button>
            <button class="tab-btn btn-filter" onclick="filterData('food', this)">Food</button>
        </div>
        <div class="grid" id="cardGrid"></div>
    </section>

    <footer>
        <p style="letter-spacing:0.2em; font-size:0.8rem;">© 2026 JOHOKU SCHOOL FESTIVAL</p>
        <span class="admin-link" onclick="openAdmin()">Administrator</span>
    </footer>

    <script>
        /* --- 既存のロジックをここに統合 --- */
        // (先ほどのlocalStorageやrender関数、投票システム、カウントダウンをそのまま貼り付けます)
        // デザイン調整用に一部スクロール連動アニメーションを追加
        
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.8) {
                    el.classList.add('active');
                }
            });
        });

        // ロード画面解除
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
            }, 1500);
        };

        // --- 以下にあなたのJSロジック(localStorage/投票/Admin)を記述 ---
        /* (前述のJavaScriptをここに入れてください。デザインに合わせてrender系のみ微調整) */
    </script>
</body>
</html>
